<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 900" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Noto Sans SC',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#070a14"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="0.5" stop-color="#7cf3ff"/>
      <stop offset="1" stop-color="#b06bff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#00e5ff"/>
    </marker>
    <marker id="arrowO" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#ff9d00"/>
    </marker>
    <marker id="arrowDim" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5f7797"/>
    </marker>
  </defs>

  <rect width="1360" height="900" fill="url(#bg)"/>
  <!-- faint grid -->
  <g stroke="#12203a" stroke-width="1" opacity="0.6">
    <line x1="0" y1="220" x2="1360" y2="220"/><line x1="0" y1="440" x2="1360" y2="440"/>
    <line x1="0" y1="660" x2="1360" y2="660"/>
    <line x1="340" y1="0" x2="340" y2="900"/><line x1="680" y1="0" x2="680" y2="900"/>
    <line x1="1020" y1="0" x2="1020" y2="900"/>
  </g>

  <!-- Title -->
  <text x="40" y="52" font-size="30" font-weight="700" fill="url(#titleGrad)" filter="url(#glow)">《星舰熔炉》 核心循环 &amp; 界面布局</text>
  <text x="42" y="80" font-size="15" fill="#7f93ad">掉落物理合成 × 自走棋 · 科幻未来风 · 抖音小游戏</text>
  <line x1="40" y1="96" x2="1320" y2="96" stroke="#1c3358" stroke-width="1.5"/>

  <!-- ============ LEFT: CORE LOOP ============ -->
  <text x="40" y="132" font-size="19" font-weight="700" fill="#00e5ff">① 核心循环（回合制：备战 ⇄ 战斗，每 N 波打一次 Boss）</text>

  <!-- loop arrows -->
  <g fill="none" stroke="#00e5ff" stroke-width="2.5">
    <path d="M 418,208 Q 500,240 500,318" marker-end="url(#arrow)"/>
    <path d="M 510,378 Q 500,470 428,494" marker-end="url(#arrow)"/>
    <path d="M 232,500 Q 150,472 150,384" marker-end="url(#arrow)"/>
    <path d="M 158,312 Q 168,238 232,204" marker-end="url(#arrow)"/>
  </g>

  <!-- loop nodes -->
  <g>
    <rect x="242" y="172" width="180" height="62" rx="10" fill="#0e1c33" stroke="#00e5ff" stroke-width="2"/>
    <text x="332" y="200" font-size="16" font-weight="700" fill="#e6f4ff" text-anchor="middle">备战 · 掉落合成</text>
    <text x="332" y="221" font-size="12" fill="#8fb4d6" text-anchor="middle">限时造船，拖入编队</text>

    <rect x="430" y="312" width="182" height="62" rx="10" fill="#0e1c33" stroke="#b06bff" stroke-width="2"/>
    <text x="521" y="340" font-size="16" font-weight="700" fill="#e6f4ff" text-anchor="middle">布阵 · 激活羁绊</text>
    <text x="521" y="361" font-size="12" fill="#c3a6ff" text-anchor="middle">凑阵营/舰种，调站位</text>

    <rect x="242" y="462" width="180" height="62" rx="10" fill="#0e1c33" stroke="#ff2e88" stroke-width="2"/>
    <text x="332" y="490" font-size="16" font-weight="700" fill="#e6f4ff" text-anchor="middle">自动战斗</text>
    <text x="332" y="511" font-size="12" fill="#ff9dc4" text-anchor="middle">羁绊生效 + 旗舰战术技</text>

    <rect x="52" y="312" width="180" height="62" rx="10" fill="#0e1c33" stroke="#ffb43d" stroke-width="2"/>
    <text x="142" y="340" font-size="16" font-weight="700" fill="#e6f4ff" text-anchor="middle">结算 · 发金币</text>
    <text x="142" y="361" font-size="12" fill="#ffd08a" text-anchor="middle">连胜/连败奖励</text>
  </g>

  <!-- center loop label -->
  <circle cx="332" cy="348" r="34" fill="#0b1526" stroke="#2f4d7a" stroke-width="1.5"/>
  <text x="332" y="344" font-size="14" font-weight="700" fill="#7cf3ff" text-anchor="middle">循环</text>
  <text x="332" y="362" font-size="13" fill="#7cf3ff" text-anchor="middle">× N 波</text>

  <!-- branch to boss -->
  <path d="M 332,524 L 332,556" fill="none" stroke="#ff9d00" stroke-width="2.5" marker-end="url(#arrowO)"/>
  <rect x="207" y="560" width="250" height="56" rx="10" fill="#1a1020" stroke="#ff9d00" stroke-width="2.5" filter="url(#glow)"/>
  <text x="332" y="586" font-size="16" font-weight="700" fill="#ffd08a" text-anchor="middle">★ Boss 波 · 舰队总决战</text>
  <text x="332" y="606" font-size="12" fill="#c79a5a" text-anchor="middle">多阶段血条 · 濒死可看广告翻盘</text>

  <path d="M 332,616 L 332,648" fill="none" stroke="#00e5ff" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="237" y="652" width="190" height="50" rx="10" fill="#0e1c33" stroke="#00e5ff" stroke-width="2"/>
  <text x="332" y="682" font-size="15" font-weight="700" fill="#e6f4ff" text-anchor="middle">通关 → 解锁下一关</text>

  <!-- return dashed -->
  <path d="M 237,677 Q 40,660 40,420 Q 40,190 232,188" fill="none" stroke="#5f7797" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowDim)"/>
  <text x="52" y="430" font-size="12" fill="#6f88a8" transform="rotate(-90 52,430)">↻ 下一关继续新一轮循环</text>

  <!-- faction legend -->
  <text x="40" y="748" font-size="15" font-weight="700" fill="#9fb8d8">四大阵营配色（一眼识别羁绊）</text>
  <g font-size="13" fill="#d7e6f5">
    <circle cx="52" cy="774" r="8" fill="#ff9d00"/><text x="68" y="779">帝国舰队 · 攻击</text>
    <circle cx="212" cy="774" r="8" fill="#ff2e5b"/><text x="228" y="779">异星生体 · 再生</text>
    <circle cx="372" cy="774" r="8" fill="#5fb0ff"/><text x="388" y="779">机械军团 · 护盾</text>
    <circle cx="52" cy="806" r="8" fill="#b06bff"/><text x="68" y="811">赛博幽影 · 暴击</text>
  </g>
  <text x="40" y="852" font-size="12" fill="#6f88a8">舰种（突击/炮舰/无人机群/辅助）与阵营叠加，可同时吃多条羁绊。</text>

  <!-- ============ RIGHT: SCREEN LAYOUT ============ -->
  <text x="700" y="132" font-size="19" font-weight="700" fill="#00e5ff">② 对局界面布局（竖屏）</text>

  <!-- phone frame -->
  <rect x="855" y="150" width="350" height="712" rx="30" fill="#060a13" stroke="#2f4d7a" stroke-width="3"/>
  <rect x="868" y="164" width="324" height="684" rx="20" fill="#0a1120" stroke="#16263f" stroke-width="1.5"/>

  <!-- status strip -->
  <rect x="880" y="176" width="300" height="34" rx="8" fill="#101d33" stroke="#24406b" stroke-width="1"/>
  <text x="892" y="198" font-size="13" fill="#cfe4f7">关卡 1-3</text>
  <text x="1010" y="198" font-size="13" fill="#8fb4d6" text-anchor="middle">第 2/5 波</text>
  <text x="1168" y="198" font-size="13" fill="#ffd08a" text-anchor="end">💰1200</text>

  <!-- enemy row -->
  <rect x="880" y="218" width="300" height="52" rx="8" fill="#1a0f14" stroke="#5a2130" stroke-width="1"/>
  <text x="892" y="238" font-size="12" fill="#ff7a95">敌军来袭 ▼</text>
  <g fill="#ff3b5c">
    <path d="M980,244 l10,16 l-20,0 Z"/><path d="M1030,244 l10,16 l-20,0 Z"/><path d="M1080,244 l10,16 l-20,0 Z"/>
  </g>

  <!-- formation zone -->
  <rect x="880" y="278" width="300" height="176" rx="10" fill="#0c1728" stroke="#00e5ff" stroke-width="1.6"/>
  <text x="892" y="298" font-size="13" font-weight="700" fill="#7cf3ff">编队区 · 布阵</text>
  <text x="1172" y="298" font-size="11" fill="#6f88a8" text-anchor="end">前排扛线 / 后排输出</text>
  <!-- front row (closer to enemy = upper) -->
  <g>
    <rect x="905" y="312" width="76" height="52" rx="8" fill="#141f33" stroke="#ff9d00" stroke-width="1.6"/>
    <rect x="992" y="312" width="76" height="52" rx="8" fill="#141f33" stroke="#ff9d00" stroke-width="1.6"/>
    <rect x="1079" y="312" width="76" height="52" rx="8" fill="#141f33" stroke="#5fb0ff" stroke-width="1.6"/>
    <path d="M943,326 l12,20 l-24,0 Z" fill="#ff9d00"/>
    <path d="M1030,326 l12,20 l-24,0 Z" fill="#ff9d00"/>
    <path d="M1117,326 l12,20 l-24,0 Z" fill="#5fb0ff"/>
    <text x="1030" y="380" font-size="10" fill="#6f88a8" text-anchor="middle">前排（突击舰）</text>
  </g>
  <!-- back row -->
  <g>
    <rect x="905" y="394" width="76" height="52" rx="8" fill="#141f33" stroke="#b06bff" stroke-width="1.6"/>
    <rect x="992" y="394" width="76" height="52" rx="8" fill="#141f33" stroke="#ff9d00" stroke-width="1.6"/>
    <rect x="1079" y="394" width="76" height="52" rx="8" fill="#0f1a2c" stroke="#33507d" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="931" y="410" width="24" height="20" rx="3" fill="#b06bff"/>
    <rect x="1018" y="410" width="24" height="20" rx="3" fill="#ff9d00"/>
    <text x="1117" y="425" font-size="18" fill="#3f5f8a" text-anchor="middle">+</text>
    <text x="1030" y="463" font-size="10" fill="#6f88a8" text-anchor="middle">后排（炮舰 / 空位）</text>
  </g>

  <!-- synergy chips -->
  <rect x="880" y="462" width="300" height="46" rx="8" fill="#100c1e" stroke="#b06bff" stroke-width="1.6"/>
  <text x="892" y="480" font-size="12" font-weight="700" fill="#c3a6ff">羁绊</text>
  <g font-size="11" fill="#e6f4ff">
    <rect x="928" y="470" width="70" height="26" rx="13" fill="#241a0a" stroke="#ff9d00"/><text x="963" y="487" text-anchor="middle">帝国×4</text>
    <rect x="1006" y="470" width="70" height="26" rx="13" fill="#0f1f33" stroke="#5fb0ff"/><text x="1041" y="487" text-anchor="middle">机械×2</text>
    <rect x="1084" y="470" width="80" height="26" rx="13" fill="#1e0f18" stroke="#ff2e88"/><text x="1124" y="487" text-anchor="middle">炮舰×2</text>
  </g>

  <!-- divider -->
  <text x="1030" y="528" font-size="12" fill="#5f7797" text-anchor="middle">▲ 战场　　　　熔炉 ▼</text>

  <!-- forge zone -->
  <rect x="880" y="536" width="300" height="228" rx="10" fill="#0c1728" stroke="#ffb43d" stroke-width="1.6"/>
  <text x="892" y="556" font-size="13" font-weight="700" fill="#ffd08a">熔炉 · 掉落合成</text>
  <!-- crosshair + next -->
  <line x1="980" y1="566" x2="980" y2="596" stroke="#ffd08a" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="980" cy="600" r="10" fill="#00e5ff"/>
  <text x="1150" y="562" font-size="11" fill="#8fb4d6" text-anchor="end">准星投放 →</text>
  <!-- container with stacked merge balls -->
  <rect x="906" y="614" width="248" height="140" rx="10" fill="#0a1424" stroke="#274063" stroke-width="1.6"/>
  <line x1="906" y1="628" x2="1154" y2="628" stroke="#ff5a5a" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="1150" y="624" font-size="9.5" fill="#ff7a7a" text-anchor="end">过载线</text>
  <g>
    <circle cx="948" cy="726" r="24" fill="#1d3350" stroke="#5fb0ff"/>
    <circle cx="1004" cy="732" r="18" fill="#243a1e" stroke="#7fe08a"/>
    <circle cx="1052" cy="726" r="26" fill="#3a2410" stroke="#ff9d00"/>
    <circle cx="1108" cy="734" r="15" fill="#301a2a" stroke="#ff2e88"/>
    <circle cx="974" cy="686" r="16" fill="#2a2340" stroke="#b06bff"/>
    <circle cx="1028" cy="684" r="20" fill="#1d3350" stroke="#5fb0ff"/>
    <circle cx="1082" cy="686" r="13" fill="#243a1e" stroke="#7fe08a"/>
  </g>

  <!-- action bar -->
  <rect x="880" y="772" width="300" height="60" rx="10" fill="#0e1626" stroke="#24406b" stroke-width="1.2"/>
  <rect x="890" y="782" width="88" height="40" rx="8" fill="#1a2540" stroke="#ff2e88" stroke-width="1.6"/>
  <text x="934" y="807" font-size="12" fill="#ff9dc4" text-anchor="middle">战术技</text>
  <rect x="986" y="782" width="88" height="40" rx="8" fill="#1a2540" stroke="#00e5ff" stroke-width="1.4"/>
  <text x="1030" y="801" font-size="11" fill="#cfe4f7" text-anchor="middle">熔炉刷新</text>
  <text x="1030" y="815" font-size="9" fill="#7f93ad" text-anchor="middle">📺 广告</text>
  <rect x="1082" y="782" width="88" height="40" rx="8" fill="#1a2540" stroke="#ffb43d" stroke-width="1.4"/>
  <text x="1126" y="801" font-size="11" fill="#ffd08a" text-anchor="middle">招募援军</text>
  <text x="1126" y="815" font-size="9" fill="#7f93ad" text-anchor="middle">📺 广告</text>

  <!-- callouts (left of phone) -->
  <g font-size="12.5" fill="#cfe0f2">
    <line x1="845" y1="330" x2="855" y2="360" stroke="#00e5ff" stroke-width="1.4"/>
    <text x="700" y="326"><tspan x="700" dy="0" font-weight="700" fill="#7cf3ff">编队布阵</tspan></text>
    <text x="700" y="344"><tspan x="700">合成出的战舰在此</tspan><tspan x="700" dy="16">排兵，前肉后输出</tspan></text>

    <line x1="845" y1="485" x2="855" y2="485" stroke="#b06bff" stroke-width="1.4"/>
    <text x="700" y="470"><tspan x="700" font-weight="700" fill="#c3a6ff">羁绊面板</tspan></text>
    <text x="700" y="488"><tspan x="700">同阵营/舰种达标</tspan><tspan x="700" dy="16">激活 buff（核心）</tspan></text>

    <line x1="845" y1="640" x2="855" y2="640" stroke="#ffb43d" stroke-width="1.4"/>
    <text x="700" y="628"><tspan x="700" font-weight="700" fill="#ffd08a">熔炉合成</tspan></text>
    <text x="700" y="646"><tspan x="700">掉落造船，合成</tspan><tspan x="700" dy="16">大西瓜手感</tspan></text>

    <line x1="845" y1="800" x2="855" y2="800" stroke="#00e5ff" stroke-width="1.4"/>
    <text x="700" y="788"><tspan x="700" font-weight="700" fill="#7cf3ff">战术技/广告</tspan></text>
    <text x="700" y="806"><tspan x="700">增益点位：刷新</tspan><tspan x="700" dy="16">/援军/翻倍</tspan></text>
  </g>
</svg>
