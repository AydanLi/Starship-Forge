<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星舰熔炉 · 合成原型</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; background:#060a13; color:#cfe0f2;
    font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; overflow:hidden; }
  #wrap{ height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:8px; }
  #title{ font-size:15px; letter-spacing:2px; color:#7cf3ff; text-shadow:0 0 8px #00e5ff66; }
  #title b{ color:#ffd08a; }
  #stage{ position:relative; width:min(480px,96vw);
    aspect-ratio:480/760; border-radius:16px; overflow:hidden;
    box-shadow:0 0 0 2px #22406b, 0 0 40px #00131f inset, 0 8px 40px #000a; }
  canvas{ display:block; width:100%; height:100%; touch-action:none; }
  #bar{ display:flex; gap:10px; width:min(480px,96vw); }
  button{ flex:1; padding:12px 8px; font-size:15px; font-weight:700; cursor:pointer;
    border-radius:12px; border:2px solid; background:#101d33; color:#cfe0f2;
    font-family:inherit; transition:.12s; }
  #fire{ border-color:#ff2e88; color:#ff9dc4; text-shadow:0 0 6px #ff2e8855; }
  #fire:active{ background:#2a1020; }
  #reset{ border-color:#00e5ff; color:#8fe8ff; }
  #reset:active{ background:#0a1e2a; }
  button:disabled{ opacity:.4; cursor:not-allowed; }
  #hint{ font-size:12px; color:#6f88a8; height:14px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="title"><b>星舰熔炉</b> · 掉落合成核心原型</div>
  <div id="stage"><canvas id="cv" width="480" height="760"></canvas></div>
  <div id="bar">
    <button id="fire">齐射 Boss（火力 0）</button>
    <button id="reset">重新开始</button>
  </div>
  <div id="hint">移动手指/鼠标瞄准，点击投放 · 相同战舰相撞即合成升级</div>
</div>

(function () {

  const W = 480, H = 760;

    W, H, CT,
    Y_DROP: 168, Y_WARN: 214, OVER_LIMIT: 2.0,

      { name: '纳米芯片', r: 15, c: '#5fd0ff' }, { name: '能量电池', r: 21, c: '#35e0c0' },
      { name: '武器模块', r: 27, c: '#7cff8a' }, { name: '激光炮台', r: 34, c: '#ffd24a' },
      { name: '攻击无人机', r: 42, c: '#ff9d3a' }, { name: '星际战机', r: 51, c: '#ff6a3a' },
      { name: '护卫舰', r: 61, c: '#ff4d7a' }, { name: '驱逐舰', r: 72, c: '#ff3ea0' },
      { name: '巡洋舰', r: 85, c: '#c86bff' }, { name: '战列舰', r: 100, c: '#8391ff' },

/* save.js — 服务层：本地存档 + 防篡改校验 + 云同步接口预留。
   ── 防篡改说明（务必阅读）──────────────────────────────
   本地校验和（盐值在客户端）只能防“直接手改存档”的普通玩家，
   防不了逆向拿到盐值的人。真正的防线是未来的服务器：
   服务器用私钥对存档做 HMAC 签名并保存权威副本，客户端只验签、不持钥。
   本模块的存档结构（版本号 v / 数据 d / 校验和 sum / 时间戳 ts）
   即按该方案设计，接服务器时结构不变、只补 remote 实现。 */
window.SF = window.SF || {};
(function () {
  'use strict';
  const KEY = 'starforge_save_v1';
  const SALT = 'SF-proto-2026';   // 原型盐值；正式版删除，改由服务器端 HMAC 私钥签名
  let mem = null;                 // localStorage 不可用时的内存兜底（本次会话内有效）
  let lastWrite = 0;

  // djb2 哈希 → 十六进制校验和（轻量，防手改；非加密安全）
  function hash(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) h = ((h << 5) + h + str.charCodeAt(i)) >>> 0;
    return h.toString(16);
  }
  function store() { try { return window.localStorage; } catch (e) { return null; } }
  function payload() {
    const G = SF.G;
    return { v: 1, level: G.level, wave: G.wave, gold: G.gold, score: G.score, bestTier: G.bestTier, ts: Date.now() };
  }

  SF.save = {
    /** 写档。默认 1 秒节流；force=true 立即写（关键进度点用）。 */
    write(force) {
      const now = Date.now();
      if (!force && now - lastWrite < 1000) return;
      lastWrite = now;
      const p = payload();
      const rec = JSON.stringify({ d: p, sum: hash(JSON.stringify(p) + SALT) });
      const s = store();
      if (s) { try { s.setItem(KEY, rec); return; } catch (e) { /* 配额/隐私模式 */ } }
      mem = rec;
    },
    /** 读档。返回 {data} | {tampered:true} | null（无档/版本不符/解析失败）。 */
    load() {
      const s = store();
      let raw = null;
      if (s) { try { raw = s.getItem(KEY); } catch (e) { raw = mem; } }
      if (!raw) raw = mem;
      if (!raw) return null;
      try {
        const rec = JSON.parse(raw);
        if (hash(JSON.stringify(rec.d) + SALT) !== rec.sum) return { tampered: true };  // 校验失败 → 疑似篡改
        if (!rec.d || rec.d.v !== 1) return null;   // 版本不符 → 未来在此做迁移
        return { data: rec.d };
      } catch (e) { return null; }
    },
    clear() { const s = store(); if (s) { try { s.removeItem(KEY); } catch (e) {} } mem = null; },
    hasProgress(d) { return !!d && (d.level > 0 || d.wave > 0 || d.gold > 0 || d.score > 0); },

    /* ── 云同步接口预留（正式版实现）─────────────────────────
       登录流程约定：
         1. 登录成功后 remote.pull() 拉取服务器权威存档（服务器验签自己的 HMAC）；
         2. 本地 load()：若 tampered → 直接采用服务器档（本地视为作弊/损坏）；
         3. 双方均有效 → 比进度（level, wave, ts 依次比较），取高者；
            本地更新 → remote.push(rec) 上行，服务器重新签名落库；
         4. 无网络 → 本地档先用，标记 dirty，下次联网补推。
       抖音端替换点：localStorage → tt.setStorageSync / tt.getStorageSync；
                     网络 → tt.request 调自建服务或抖音云。
       占位（保持 null，接入时赋值实现）： */
    remote: null   // { pull(): Promise<rec|null>, push(rec): Promise<ok>, verify(rec): Promise<ok> }
  };

  window.addEventListener('beforeunload', () => SF.save.write(true));
})();

/* fx.js — 服务层：粒子/光束/飘字/屏震 特效池。自持状态，供系统层调用、render 绘制。 */
window.SF = window.SF || {};
(function () {
  'use strict';
  const { rand, clamp } = SF.util;
  let particles = [], beams = [], floats = [], shake = 0;

  SF.fx = {
    burst(x, y, color, n) {
      for (let i = 0; i < n; i++) { const a = rand(0, 7), s = rand(1, 5); particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 1, color, r: rand(2, 4) }); }
    },
    addBeam(b) { beams.push(b); },
    addFloat(f) { floats.push(f); },
    addShake(v) { shake = Math.min(shake + v, 10); },
    setShake(v) { shake = v; },
    shakeOffset() {
      if (shake > 0.2) { const sx = rand(-shake, shake), sy = rand(-shake, shake); shake *= 0.85; return { sx, sy }; }
      shake = 0; return { sx: 0, sy: 0 };
    },
    update(dt) {
      for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= dt * 1.6; }
      particles = particles.filter(p => p.life > 0);
      for (const b of beams) b.life -= dt * 2.2; beams = beams.filter(b => b.life > 0);
      for (const f of floats) { f.y -= 14 * dt; f.life -= dt * 0.9; } floats = floats.filter(f => f.life > 0);
    },
    clear() { particles = []; beams = []; floats = []; shake = 0; },
    draw(ctx) {
      for (const p of particles) { ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill(); }
      ctx.globalAlpha = 1;
      for (const b of beams) { ctx.globalAlpha = Math.max(0, b.life) * 0.85; ctx.strokeStyle = b.c; ctx.lineWidth = 2.4; ctx.beginPath(); ctx.moveTo(b.x1, b.y1); ctx.lineTo(b.x2, b.y2); ctx.stroke(); }
      ctx.globalAlpha = 1;
      ctx.textAlign = 'center';
      for (const f of floats) { ctx.globalAlpha = clamp(f.life, 0, 1); ctx.fillStyle = f.color; ctx.font = 'bold ' + f.sz + 'px sans-serif'; ctx.fillText(f.t, f.x, f.y); }
      ctx.globalAlpha = 1; ctx.textAlign = 'left';
    }
  };
})();

/* synergy.js — 服务层：羁绊计算（纯函数）。数值调整只改这个文件。 */
window.SF = window.SF || {};
(function () {
  'use strict';
  SF.synergy = {
    compute(units) {
      const FAC = SF.C.FAC;
      const fc = [0, 0, 0, 0], cc = [0, 0, 0, 0];
      for (const u of units) { if (u.summon) continue; fc[u.fac]++; cc[u.cls]++; }
      const b = { atkMul: 1, spdMul: 1, crit: 0, dmgMul: 1, frontRed: 0, regen: 0, shieldPct: 0, revive: false, splash: false, summonMech: 0, summonDrone: 0, heal: 0 };
      const active = [], chip = (n, k, c) => active.push({ t: n + '×' + k, c });
      if (fc[0] >= 2) { b.atkMul *= fc[0] >= 4 ? 1.35 : 1.15; chip('帝国', fc[0], FAC[0].c); }
      if (fc[1] >= 2) { b.regen += 0.02; if (fc[1] >= 4) b.revive = true; chip('异星', fc[1], FAC[1].c); }
      if (fc[2] >= 2) { b.shieldPct = fc[2] >= 4 ? 0.25 : 0.10; if (fc[2] >= 4) b.summonMech = 2; chip('机械', fc[2], FAC[2].c); }
      if (fc[3] >= 2) { b.crit = 0.2; if (fc[3] >= 4) b.spdMul *= 1.4; chip('赛博', fc[3], FAC[3].c); }
      if (cc[0] >= 2) { b.frontRed = cc[0] >= 4 ? 0.4 : 0.2; chip('突击', cc[0], '#dfe8f5'); }
      if (cc[1] >= 2) { b.dmgMul *= 1.25; if (cc[1] >= 4) b.splash = true; chip('炮舰', cc[1], '#dfe8f5'); }
      if (cc[2] >= 2) { b.summonDrone = cc[2] >= 4 ? 3 : 1; chip('无人机', cc[2], '#dfe8f5'); }
      if (cc[3] >= 2) { b.heal = 0.02; chip('辅助', cc[3], '#dfe8f5'); }
      return { buffs: b, active };
    },
    applyBuffs(units, b) {
      for (const u of units) { u.atk = Math.round(u.atk * b.atkMul * b.dmgMul); u.spd *= b.spdMul; u.shield = Math.round(u.maxHp * b.shieldPct); }
    }
  };
})();

        boss.isBoss = true; boss.name = SF.G.bossName; arr.push(boss);

      } else {
        const n = Math.min(5, 3 + lv);
        for (let i = 0; i < n; i++) arr.push(this.mkEnemy(240 * (1 + 0.42 * lv) * (1 + 0.25 * wv), 24 * (1 + 0.38 * lv), 1.0));
      }

    },
    genEnemiesPreview(lv, wv) {

      if (isBoss) { a.push({ boss: true }); for (let i = 0; i < (lv >= 1 ? 2 : 1); i++) a.push({ boss: false }); }
      else for (let i = 0; i < Math.min(5, 3 + lv); i++) a.push({ boss: false });

    },
    layout(units, isEnemy, keepFront) {
      const C = SF.C;
      const alive = units.filter(u => u.alive);
      if (!keepFront) { alive.sort((a, b) => b.maxHp - a.maxHp); const fn = Math.max(1, Math.ceil(alive.length / 2)); alive.forEach((u, i) => u.front = i < fn); }
      const rowY = isEnemy ? { front: 258, back: 176 } : { front: 470, back: 560 };
      const place = (list, y) => { const k = list.length, x0 = C.CT.left + 42, x1 = C.CT.right - 42; list.forEach((u, i) => { u.x = k === 1 ? C.W / 2 : x0 + (x1 - x0) * i / (k - 1); u.y = y; }); };
      place(alive.filter(u => u.front), rowY.front); place(alive.filter(u => !u.front), rowY.back);
    }
  };
})();

/* forge.js — 系统层：熔炉。matter 物理、投放、同级合成、过载判定。engine/world 为模块私有。 */
window.SF = window.SF || {};
(function () {
  'use strict';
  const { Engine, Bodies, Composite, Events, Body } = Matter;
  let engine = null, world = null, mergeQueue = [];

  function onCollide(ev) {
    for (const p of ev.pairs) {
      const a = p.bodyA, b = p.bodyB;
      if (a.gTier === undefined || b.gTier === undefined || a.merging || b.merging || a.gTier !== b.gTier || a.gTier >= SF.C.TIERS.length - 1) continue;
      a.merging = b.merging = true; mergeQueue.push([a, b]);
    }
  }
  function processMerges() {
    const G = SF.G, C = SF.C;
    for (const [a, b] of mergeQueue) {
      const nx = (a.position.x + b.position.x) / 2, ny = (a.position.y + b.position.y) / 2, nt = a.gTier + 1;
      Composite.remove(world, a); Composite.remove(world, b); SF.forge.addBall(nt, nx, ny, -1.5);
      G.score += C.VALUE[nt]; G.bestTier = Math.max(G.bestTier, nt);
      SF.fx.burst(nx, ny, C.TIERS[nt].c, 8 + nt);
      if (nt >= 6) SF.fx.addShake(nt * 0.6);
    }
    if (mergeQueue.length) { mergeQueue.length = 0; SF.ui.update(); }
  }
  function checkOverflow(dt) {
    const G = SF.G, C = SF.C;
    for (const b of Composite.allBodies(world)) {
      if (b.gTier === undefined || performance.now() - b.born < 400) continue;
      if (b.position.y - b.circleRadius < C.Y_WARN && b.speed < 1.3) b.overTime += dt; else b.overTime = 0;
      if (b.overTime > C.OVER_LIMIT) {
        G.phase = 'GAMEOVER'; G.over = true; G.current = null;
        SF.ui.update(); SF.ui.setHint('熔炉过载！点击「重新开始」'); return;
      }
    }
  }

  SF.forge = {
    reset() {
      if (world) Composite.clear(world, false);
      engine = Engine.create(); engine.gravity.y = 1.0;
      engine.positionIterations = 10; engine.velocityIterations = 8; world = engine.world;
      const C = SF.C, o = { isStatic: true, restitution: 0.1, friction: 0.4 }, t = 40;
      Composite.add(world, [
        Bodies.rectangle((C.CT.left + C.CT.right) / 2, C.CT.floor + t / 2, (C.CT.right - C.CT.left) + 40, t, o),
        Bodies.rectangle(C.CT.left - t / 2, (C.CT.top + C.CT.floor) / 2, t, (C.CT.floor - C.CT.top) + 200, o),
        Bodies.rectangle(C.CT.right + t / 2, (C.CT.top + C.CT.floor) / 2, t, (C.CT.floor - C.CT.top) + 200, o)
      ]);
      Events.on(engine, 'collisionStart', onCollide);
      mergeQueue = [];
    },
    spawnCurrent() {
      const G = SF.G;
      const t = G.nextTier; G.nextTier = SF.util.pickDropTier();
      G.current = { tier: t, x: SF.C.W / 2 }; G.canDrop = true; SF.ui.update();
    },
    drop() {
      const G = SF.G, C = SF.C;
      if (G.phase !== 'PREP' || !G.current || !G.canDrop || G.over) return;
      const r = C.TIERS[G.current.tier].r;
      this.addBall(G.current.tier, SF.util.clamp(G.current.x, C.CT.left + r + 1, C.CT.right - r - 1), C.Y_DROP, 0.5);
      G.current = null; G.canDrop = false;
      setTimeout(() => { if (!G.over && G.phase === 'PREP') SF.forge.spawnCurrent(); }, 420);
    },
    addBall(tier, x, y, vy) {
      const C = SF.C, r = C.TIERS[tier].r;
      const b = Bodies.circle(x, y, r, { restitution: 0.08, friction: 0.4, frictionStatic: 0.6, density: 0.001, slop: 0.02 });
      b.gTier = tier; b.merging = false; b.overTime = 0; b.born = performance.now();
      if (tier >= C.DEPLOY_MIN) { b.fac = (Math.random() * 4) | 0; b.cls = (Math.random() * 4) | 0; }
      if (vy) Body.setVelocity(b, { x: 0, y: vy });
      Composite.add(world, b); return b;
    },
    removeBody(b) { Composite.remove(world, b); },
    bodies() { return world ? Composite.allBodies(world) : []; },
    deployables() { return this.bodies().filter(b => b.gTier >= SF.C.DEPLOY_MIN); },
    update(dt) { Engine.update(engine, 1000 / 60); processMerges(); checkOverflow(dt); }
  };
})();

/* board.js — 系统层：编队。阵位/待编区/拖拽/升星（同级同星叠放）。 */
window.SF = window.SF || {};
(function () {
  'use strict';
  function tokenAt(px, py) {
    const G = SF.G;
    for (let i = 0; i < 6; i++) { const t = G.slots[i]; if (t && Math.hypot(px - t.x, py - t.y) < 34) return { tok: t, fromSlot: i }; }
    for (const t of G.bench) { if (Math.hypot(px - t.x, py - t.y) < 30) return { tok: t, fromSlot: null }; }
    return null;
  }
  function slotAt(px, py) {
    const C = SF.C;
    for (let i = 0; i < 6; i++) if (Math.hypot(px - C.SLOTC[i].x, py - C.SLOTC[i].y) < C.SLOT_HALF) return i;
    return -1;
  }
  function removeFromBench(t) { const b = SF.G.bench, i = b.indexOf(t); if (i >= 0) b.splice(i, 1); }

  SF.board = {
    enter() {
      const G = SF.G;
      if (G.phase !== 'PREP') return;
      const dep = SF.forge.deployables();
      if (!dep.length) { SF.ui.flashHint('还没有可上阵的战舰（需合成到5级“攻击无人机”以上）'); return; }
      // token 引用熔炉刚体，开战时才消耗
      let toks = dep.map(b => ({ tier: b.gTier, fac: b.fac, cls: b.cls, star: 1, bodies: [b], x: 0, y: 0 }));
      toks.sort((a, b) => b.tier - a.tier);
      G.slots = [null, null, null, null, null, null]; G.bench = [];
      toks.forEach((t, i) => { if (i < 6) G.slots[i] = t; else G.bench.push(t); });
      this.relayout();
      G.phase = 'DEPLOY'; SF.ui.update();
      SF.ui.setHint('拖动战舰布阵：前排扛伤/后排输出 · 相同战舰(同级同星)叠一起升星 · 好了点开战');
    },

/* battle.js — 系统层：自走棋自动战斗。开战/寻敌/结算/战术技/胜负。 */

(function () {

  function enemyOf(u) { const G = SF.G; return u.team === 'p' ? G.eUnits : G.pUnits; }

    const f = enemyOf(u).filter(x => x.alive); if (!f.length) return null;
    const fr = f.filter(x => x.front); const pool = fr.length ? fr : f;

    const G = SF.G;

    hit(t, dmg); addBeam(u, t, crit);

  SF.battle = {
    start() {

      const placedIdx = []; G.slots.forEach((t, i) => { if (t) placedIdx.push(i); });
      if (!placedIdx.length) { SF.ui.flashHint('至少放一艘战舰进阵位再开战'); return; }
      G.pUnits = [];

      for (let i = 0; i < G.pBuffs.summonMech; i++) G.pUnits.push(SF.fleet.mkSummon('mech'));
      for (let i = 0; i < G.pBuffs.summonDrone; i++) G.pUnits.push(SF.fleet.mkSummon('drone'));

      G.tacticalReady = true; G.tacticalCd = 0; G.battleTime = 0; G.phase = 'BATTLE'; SF.ui.update();

      SF.ui.update();

  };
})();

    for (const e of preview) { ctx.fillStyle = e.boss ? '#ff3b5c' : '#ff6a6a'; const s = e.boss ? 16 : 9; ctx.beginPath(); ctx.moveTo(ex + s, 104); ctx.lineTo(ex + s * 2, 104 - s); ctx.lineTo(ex, 104 - s); ctx.closePath(); ctx.fill(); ex += s * 2 + 8; }
    ctx.textAlign = 'center'; ctx.fillStyle = '#5f7797'; ctx.font = '11px sans-serif';
    ctx.fillText('前排（近敌·扛伤）', C.W / 2, 250); ctx.fillText('后排（受保护·输出）', C.W / 2, 452);
    for (let i = 0; i < 6; i++) { const c = C.SLOTC[i]; ctx.strokeStyle = '#2f4d7a'; ctx.setLineDash([5, 5]); ctx.lineWidth = 1.5; roundRect(c.x - C.SLOT_HALF, c.y - C.SLOT_HALF, C.SLOT_HALF * 2, C.SLOT_HALF * 2, 10); ctx.stroke(); ctx.setLineDash([]); }
    ctx.strokeStyle = '#1c2e48'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]); roundRect(C.CT.left, 556, C.CT.right - C.CT.left, 76, 10); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = '#6f88a8'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left'; ctx.fillText('待编战舰（拖进上方阵位；相同战舰叠放升星）', C.CT.left + 6, 550);
    for (let i = 0; i < 6; i++) if (G.slots[i] && G.slots[i] !== (G.dragging && G.dragging.tok)) drawToken(G.slots[i]);
    for (const t of G.bench) if (t !== (G.dragging && G.dragging.tok)) drawToken(t);
    if (G.dragging) drawToken(G.dragging.tok, true);
  }
  function drawToken(tok, drag) {
    const C = SF.C, t = C.TIERS[tok.tier], r = 32;
    ctx.save(); ctx.translate(tok.x, tok.y);
    if (drag) { ctx.shadowColor = '#000'; ctx.shadowBlur = 12; }
    const g = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.2, 0, 0, r); g.addColorStop(0, '#fff'); g.addColorStop(0.3, t.c); g.addColorStop(1, shade(t.c, -0.5));
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.fill();
    ctx.strokeStyle = C.FAC[tok.fac].c; ctx.lineWidth = 3.5; ctx.beginPath(); ctx.arc(0, 0, r - 1, 0, 7); ctx.stroke(); ctx.shadowBlur = 0;
    ctx.fillStyle = '#08131f'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = 'bold 10px sans-serif'; ctx.fillText(t.name, 0, -2);
    ctx.font = '8px sans-serif'; ctx.fillText(C.FAC[tok.fac].name + '·' + C.CLS[tok.cls].name, 0, 9);
    ctx.textBaseline = 'alphabetic';
    if (tok.star > 1) { ctx.fillStyle = '#ffd54a'; ctx.font = 'bold 12px sans-serif'; ctx.fillText('★'.repeat(tok.star), 0, -r - 3); }
    ctx.restore();
  }

  // ---- 战斗场 ----
  function drawArena() {
    const G = SF.G, C = SF.C;
    ctx.strokeStyle = '#16263f'; ctx.lineWidth = 1; ctx.setLineDash([4, 6]); ctx.beginPath(); ctx.moveTo(0, 372); ctx.lineTo(C.W, 372); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = '#5a2130'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left'; ctx.fillText('▲ 敌军', C.CT.left, 366);
    ctx.fillStyle = '#1f5a6a'; ctx.textAlign = 'right'; ctx.fillText('我方舰队 ▼', C.CT.right, 366); ctx.textAlign = 'left';
    for (const u of G.eUnits) if (u.alive) drawUnit(u);
    for (const u of G.pUnits) if (u.alive) drawUnit(u);
  }
  function drawUnit(u) {
    const C = SF.C;
    const enemy = u.team === 'e', r = u.isBoss ? 40 : (u.summon ? 14 : 16 + u.tier * 1.6), col = enemy ? (u.isBoss ? '#ff3b5c' : '#ff6a6a') : C.FAC[u.fac].c;
    ctx.save(); ctx.translate(u.x, u.y);
    const g = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.2, 0, 0, r); g.addColorStop(0, '#fff'); g.addColorStop(0.3, col); g.addColorStop(1, shade(col, -0.5));
    ctx.shadowColor = col; ctx.shadowBlur = 10; ctx.fillStyle = g;
    if (enemy) { ctx.beginPath(); ctx.moveTo(0, r); ctx.lineTo(r, -r * 0.7); ctx.lineTo(-r, -r * 0.7); ctx.closePath(); ctx.fill(); } else { ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.fill(); }
    ctx.shadowBlur = 0; ctx.strokeStyle = '#ffffffbb'; ctx.lineWidth = 1.5;
    if (enemy) { ctx.beginPath(); ctx.moveTo(0, r); ctx.lineTo(r, -r * 0.7); ctx.lineTo(-r, -r * 0.7); ctx.closePath(); ctx.stroke(); } else { ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.stroke(); }
    if (u.shield > 0) { ctx.strokeStyle = '#7cf3ff'; ctx.globalAlpha = 0.7; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, 0, r + 4, 0, 7); ctx.stroke(); ctx.globalAlpha = 1; }
    if (!enemy && u.star > 1) { ctx.fillStyle = '#ffd54a'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('★'.repeat(u.star), 0, -r - 14); }
    ctx.restore();
    const bw = Math.max(26, r * 1.8), bx = u.x - bw / 2, by = u.y - r - 12;
    ctx.fillStyle = '#0c1424'; ctx.fillRect(bx, by, bw, 5);
    ctx.fillStyle = enemy ? '#ff4d6a' : '#49e08a'; ctx.fillRect(bx, by, bw * clamp(u.hp / u.maxHp, 0, 1), 5);
    if (u.shield > 0) { ctx.fillStyle = '#7cf3ff'; ctx.fillRect(bx, by - 3, bw * clamp(u.shield / u.maxHp, 0, 1), 2); }
    if (!u.summon) { ctx.fillStyle = enemy ? '#ffb0bb' : '#dfeaf7'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(u.isBoss ? u.name : (enemy ? '敌舰' : C.FAC[u.fac].name + C.CLS[u.cls].name), u.x, u.y + r + 12); ctx.textAlign = 'left'; }
  }

  // ---- 覆盖层 ----
  function drawResult() {
    const G = SF.G, C = SF.C;
    ctx.fillStyle = 'rgba(4,8,16,0.72)'; ctx.fillRect(0, 0, C.W, C.H); ctx.textAlign = 'center';
    if (G.result === 'win') {
      ctx.fillStyle = '#7cf3ff'; ctx.font = 'bold 34px sans-serif'; ctx.fillText('战斗胜利', C.W / 2, C.H / 2 - 30);
      ctx.fillStyle = '#ffd08a'; ctx.font = '16px sans-serif'; ctx.fillText(G.wave === C.WAVES_PER_LEVEL - 1 ? '★ 星区 Boss 已击破！' : '本波清剿完成', C.W / 2, C.H / 2 + 4);
      ctx.fillStyle = '#aef5ff'; ctx.fillText('金币 +' + G.lastGain, C.W / 2, C.H / 2 + 30);
    } else {
      ctx.fillStyle = '#ff5a7a'; ctx.font = 'bold 34px sans-serif'; ctx.fillText('舰队覆灭', C.W / 2, C.H / 2 - 30);
      ctx.fillStyle = '#cfe0f2'; ctx.font = '15px sans-serif'; ctx.fillText('回熔炉重整旗鼓，凑更强的羁绊/升星再战', C.W / 2, C.H / 2 + 6);
    }
    ctx.fillStyle = '#6f88a8'; ctx.font = '12px sans-serif'; ctx.fillText('点击下方按钮继续', C.W / 2, C.H / 2 + 52); ctx.textAlign = 'left';
    if (G.result === 'win' && !G.goldDoubled) drawAdBtn(C.BTN_DOUBLE, '📺 看广告 · 金币双倍 (+' + G.lastGain + ')');
    if (G.result === 'lose') drawAdBtn(C.BTN_OVERLOAD, '📺 旗舰超载 · 下次开战全队攻击 +50%');
  }
  function drawAdBtn(r, label) {
    ctx.fillStyle = '#1a2540'; ctx.strokeStyle = '#ffd54a'; ctx.lineWidth = 2;
    roundRect(r.x, r.y, r.w, r.h, 10); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#ffe08a'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(label, r.x + r.w / 2, r.y + 25); ctx.textAlign = 'left';
  }
  function drawAd() {
    const C = SF.C, ad = SF.ads.current();
    ctx.fillStyle = 'rgba(2,4,9,0.94)'; ctx.fillRect(0, 0, C.W, C.H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd54a'; ctx.font = 'bold 20px sans-serif'; ctx.fillText('📺 模拟激励视频 · ' + ad.label, C.W / 2, C.H / 2 - 70);
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 64px sans-serif'; ctx.fillText(Math.ceil(ad.t), C.W / 2, C.H / 2 + 16);
    ctx.fillStyle = '#5f7797'; ctx.font = '12px sans-serif';
    ctx.fillText('原型演示：正式版此处接抖音激励视频 SDK', C.W / 2, C.H / 2 + 66);
    ctx.fillText('（tt.createRewardedVideoAd，看完发放奖励）', C.W / 2, C.H / 2 + 86);
    ctx.textAlign = 'left';
  }
  function drawOver() {
    const G = SF.G, C = SF.C;
    ctx.fillStyle = 'rgba(4,8,16,0.82)'; ctx.fillRect(0, 0, C.W, C.H); ctx.textAlign = 'center';
    ctx.fillStyle = '#ff5a7a'; ctx.font = 'bold 34px sans-serif'; ctx.fillText('熔炉过载', C.W / 2, C.H / 2 - 20);
    ctx.fillStyle = '#cfe0f2'; ctx.font = '17px sans-serif'; ctx.fillText('分数 ' + G.score + ' · 最高合成 ' + C.TIERS[G.bestTier].name, C.W / 2, C.H / 2 + 12);
    ctx.fillStyle = '#6f88a8'; ctx.font = '13px sans-serif'; ctx.fillText('点击「重新开始」', C.W / 2, C.H / 2 + 44); ctx.textAlign = 'left';
  }
  function drawStory() {
    const C = SF.C, s = SF.G.story;
    ctx.fillStyle = 'rgba(3,6,12,0.9)'; ctx.fillRect(0, 0, C.W, C.H);
    const px = 38, pw = C.W - 76, py = 158, ph = 452;
    ctx.fillStyle = '#0a1524'; ctx.strokeStyle = s.color || '#00e5ff'; ctx.lineWidth = 2; roundRect(px, py, pw, ph, 14); ctx.fill(); ctx.stroke();
    ctx.fillStyle = s.color || '#00e5ff'; roundRect(px, py, pw, 30, 14); ctx.fill();
    ctx.fillStyle = '#05101c'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'left'; ctx.fillText(s.tag || '', px + 14, py + 20);
    ctx.fillStyle = s.color || '#7cf3ff'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(s.title || '', C.W / 2, py + 66);
    ctx.fillStyle = '#cfe0f2'; ctx.font = '14px sans-serif'; ctx.textAlign = 'left';
    let y = py + 106; const maxW = pw - 40;
    for (const para of s.lines) { for (const ln of wrapText(para, maxW)) { ctx.fillText(ln, px + 20, y); y += 25; } y += 8; }
    ctx.fillStyle = '#8fd8ff'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('▶ 点击「' + (s.btn || '继续') + '」', C.W / 2, py + ph - 16); ctx.textAlign = 'left';
  }

  SF.render = {
    cv, ctx,
    draw() {
      const G = SF.G, C = SF.C;
      const { sx, sy } = SF.fx.shakeOffset();
      ctx.save(); ctx.translate(sx, sy);
      ctx.fillStyle = '#070c16'; ctx.fillRect(-12, -12, C.W + 24, C.H + 24); drawGrid();
      if (G.phase === 'PREP' || G.phase === 'GAMEOVER') drawForge();
      else if (G.phase === 'DEPLOY') drawDeploy();
      else drawArena();
      drawTopHud();
      SF.fx.draw(ctx);
      if (G.phase === 'RESULT') drawResult();
      if (G.phase === 'GAMEOVER') drawOver();
      if (G.story) drawStory();
      if (SF.ads.active()) drawAd();
      ctx.restore();
    }
  };
})();

/* ui.js — 交互层：DOM 按钮与提示条。按钮点击的“做什么”由 main.js 接线。 */
window.SF = window.SF || {};
(function () {
  'use strict';
  const fireBtn = document.getElementById('fire');
  const resetBtn = document.getElementById('reset');
  const hintEl = document.getElementById('hint');
  let hintTimer = 0;
  const PREP_HINT = '备战：合成战舰（5级起带阵营/舰种），凑齐羁绊再「编队部署」';

  function setBtn(b, bc, c) { b.style.borderColor = bc; b.style.color = c; }

  SF.ui = {
    PREP_HINT,
    setHint(t) { hintEl.textContent = t; hintTimer = 0; },
    flashHint(t) { hintEl.textContent = t; hintTimer = 2; },
    tick(dt) { if (hintTimer > 0) { hintTimer -= dt; if (hintTimer <= 0 && SF.G.phase === 'PREP') hintEl.textContent = PREP_HINT; } },
    bind(onFire, onReset) { fireBtn.addEventListener('click', onFire); resetBtn.addEventListener('click', onReset); },
    update() {
      const G = SF.G, C = SF.C;
      if (SF.ads.active()) { fireBtn.disabled = true; fireBtn.textContent = '📺 广告播放中…'; return; }
      if (G.story) { fireBtn.disabled = false; fireBtn.textContent = '▶ ' + (G.story.btn || '继续'); setBtn(fireBtn, '#7cf3ff', '#aef5ff'); resetBtn.textContent = '重新开始'; return; }
      if (G.phase === 'PREP') { const n = SF.forge.deployables().length; fireBtn.textContent = '编队部署（' + n + '）'; fireBtn.disabled = n === 0; setBtn(fireBtn, '#00e5ff', '#8fe8ff'); resetBtn.textContent = '重新开始'; }
      else if (G.phase === 'DEPLOY') { const m = G.slots.filter(Boolean).length; fireBtn.textContent = '⚔ 开战（' + m + '）'; fireBtn.disabled = m === 0; setBtn(fireBtn, '#ff2e88', '#ff9dc4'); resetBtn.textContent = '重新开始'; }
      else if (G.phase === 'BATTLE') { fireBtn.textContent = G.tacticalReady ? '⚡ 战术技·全体齐射' : '战术技冷却 ' + Math.ceil(G.tacticalCd) + 's'; fireBtn.disabled = !G.tacticalReady; setBtn(fireBtn, '#ff2e88', '#ff9dc4'); }
      else if (G.phase === 'RESULT') {
        fireBtn.disabled = false;
        if (G.result === 'win') { fireBtn.textContent = (G.wave === C.WAVES_PER_LEVEL - 1 ? '进入下一星区 ▶' : '下一波 ▶'); setBtn(fireBtn, '#7cf3ff', '#aef5ff'); }
        else { fireBtn.textContent = '重试本波 ↻'; setBtn(fireBtn, '#ffb43d', '#ffd08a'); }
      }
      else if (G.phase === 'GAMEOVER') { fireBtn.disabled = true; fireBtn.textContent = '—'; }
    }
  };
})();

/* input.js — 交互层：画布指针事件，按 phase 路由到各系统。 */
window.SF = window.SF || {};
(function () {
  'use strict';
  SF.input = {
    bind() {
      const cv = SF.render.cv, C = SF.C;
      const pX = e => { const r = cv.getBoundingClientRect(); return ((e.touches ? e.touches[0].clientX : e.clientX) - r.left) / r.width * C.W; };
      const pY = e => { const r = cv.getBoundingClientRect(); return ((e.touches ? e.touches[0].clientY : e.clientY) - r.top) / r.height * C.H; };

      cv.addEventListener('pointermove', e => {
        const G = SF.G;
        if (G.phase === 'PREP' && G.current) G.current.x = pX(e);
        else if (G.phase === 'DEPLOY') SF.board.dragMove(pX(e), pY(e));
      });
      cv.addEventListener('pointerdown', e => {
        const G = SF.G;
        if (SF.ads.active()) return;                      // 广告播放中屏蔽输入
        if (G.story) { SF.storySys.advance(); return; }
        const px = pX(e), py = pY(e);
        if (G.phase === 'RESULT') { SF.econ.tryResultClick(px, py); return; }
        if (G.phase === 'PREP') {
          if (SF.econ.tryPrepClick(px, py)) return;
          if (G.current) { G.current.x = px; SF.forge.drop(); }
        } else if (G.phase === 'DEPLOY') SF.board.dragStart(px, py);
      });
      cv.addEventListener('pointerup', e => { if (SF.G.phase === 'DEPLOY') SF.board.dragEnd(pX(e), pY(e)); });
      cv.addEventListener('pointercancel', () => SF.board.cancelDrag());
    }
  };
})();

/* main.js — 装配层：接线、流程控制（下一波/重试/开局）、主循环。 */
window.SF = window.SF || {};
(function () {
  'use strict';

  function toPrep(msg) {
    const G = SF.G;
    G.pUnits = []; G.eUnits = [];
    G.slots = [null, null, null, null, null, null]; G.bench = [];
    G.phase = 'PREP';
    SF.forge.spawnCurrent();
    SF.ui.setHint(msg);
    SF.save.write(true);   // 关键进度点：立即写档
  }
  function nextAfterWin() {
    const G = SF.G, C = SF.C, S = SF.STORY;
    const wasBoss = G.wave === C.WAVES_PER_LEVEL - 1;
    if (wasBoss) { G.level++; G.wave = 0; } else G.wave++;
    toPrep('备战：合成战舰，凑齐羁绊再「编队部署」');
    if (wasBoss) { if (G.level < S.SECTORS.length) SF.storySys.queue(S.SECTORS[G.level]); else if (G.level === S.SECTORS.length) SF.storySys.queue(S.ENDING); }
    else if (G.wave === C.WAVES_PER_LEVEL - 1) SF.storySys.queue(SF.storySys.bossCard(G.level));
    SF.storySys.advance();
  }
  function retryWave() { toPrep('备战：重整旗鼓，重新合成部署'); }

  function startRun(saved) {
    const G = SF.G, S = SF.STORY;
    SF.forge.reset();
    G.reset();
    SF.fx.clear(); SF.ads.reset();
    if (saved) {   // 续档：恢复进度，跳过序章
      G.level = saved.level; G.wave = saved.wave; G.gold = saved.gold;
      G.score = saved.score; G.bestTier = saved.bestTier;
    }
    SF.forge.spawnCurrent();
    if (saved) {
      SF.ui.setHint('已读取存档：星区 ' + (G.level + 1) + ' · 第 ' + (G.wave + 1) + ' 波，继续征程');
      SF.ui.update();
    } else {
      SF.ui.setHint(SF.ui.PREP_HINT);
      SF.storySys.queue(S.INTRO, S.SECTORS[0]); SF.storySys.advance();
      SF.save.write(true);
    }
  }
  function freshRun() { SF.save.clear(); startRun(null); }   // 重新开始 = 清档从头
  function boot() {
    const r = SF.save.load();
    if (r && r.tampered) { SF.save.clear(); startRun(null); SF.ui.flashHint('⚠ 存档校验失败（疑似被修改），进度已重置'); return; }
    if (r && SF.save.hasProgress(r.data)) { startRun(r.data); return; }
    startRun(null);
  }

  function onFire() {
    const G = SF.G;
    if (SF.ads.active()) return;
    if (G.story) { SF.storySys.advance(); return; }
    if (G.phase === 'PREP') SF.board.enter();
    else if (G.phase === 'DEPLOY') SF.battle.start();
    else if (G.phase === 'BATTLE') SF.battle.tactical();
    else if (G.phase === 'RESULT') { G.result === 'win' ? nextAfterWin() : retryWave(); }
  }

  let last = performance.now();
  function loop(now) {
    const G = SF.G;
    const dt = Math.min(0.05, (now - last) / 1000); last = now;
    SF.ads.update(dt);
    if (!G.story && !SF.ads.active()) {
      if (G.phase === 'PREP') SF.forge.update(dt);
      else if (G.phase === 'BATTLE') SF.battle.update(dt);
      SF.fx.update(dt);
      SF.ui.tick(dt);
    }
    SF.render.draw();
    requestAnimationFrame(loop);
  }

  SF.main = { startRun, freshRun, retryWave, nextAfterWin };

  SF.ui.bind(onFire, freshRun);
  SF.input.bind();
  boot();
  requestAnimationFrame(loop);
})();

</script>
